services:
  db:
    image: pgvector/pgvector:pg16
    container_name: me-db
    environment:
      POSTGRES_USER: me
      POSTGRES_PASSWORD: me
      POSTGRES_DB: me
    ports:
      - "5435:5432"
    volumes:
      - me_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U me -d me"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  me_pgdata: {}
